<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Core Web Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, setDoc, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD9AFpU-tlO487wKNQ83fct9_hw_4Tu-3k",
      authDomain: "web-panel-5b06d.firebaseapp.com",
      projectId: "web-panel-5b06d",
      storageBucket: "web-panel-5b06d.firebasestorage.app",
      messagingSenderId: "680917315874",
      appId: "1:680917315874:web:73e33d46b7f8b13972357b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 전역으로 노출
    window._db = db;
    window._firestoreOps = { doc, getDoc, collection, setDoc, getDocs, deleteDoc };
    window._firebaseReady = true;
    window.dispatchEvent(new Event('firebaseReady'));
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080810;
      --surface: #10101c;
      --surface2: #18182a;
      --border: #252538;
      --accent: #7c6aff;
      --accent-glow: rgba(124,106,255,0.3);
      --accent2: #ff6aac;
      --text: #e4e4f0;
      --muted: #5a5a72;
      --success: #4ade80;
      --danger: #f87171;
      --warning: #fbbf24;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg) url('logo.gif') center/cover no-repeat fixed;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(124,106,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,106,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .orb { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; animation: float 8s ease-in-out infinite; }
    .orb1 { width: 400px; height: 400px; background: rgba(124,106,255,0.12); top: -100px; left: -100px; }
    .orb2 { width: 300px; height: 300px; background: rgba(255,106,172,0.08); bottom: -80px; right: -80px; animation-delay: -4s; }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-10px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .screen { display: none; width: 100%; min-height: 100vh; }
    .screen.active { display: flex; }

    /* ══ LOGIN ══ */
    #loginScreen { align-items: center; justify-content: center; animation: fadeIn 0.6s ease; }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 44px;
      width: 100%; max-width: 440px;
      position: relative;
      box-shadow: 0 0 60px rgba(124,106,255,0.08), 0 40px 80px rgba(0,0,0,0.4);
    }

    .login-card::before {
      content: '';
      position: absolute;
      top: -1px; left: 20%; right: 20%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }

    .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 36px; }
    .logo-icon {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      box-shadow: 0 0 20px var(--accent-glow);
    }
    .logo-text { font-size: 22px; font-weight: 800; }
    .logo-text span { color: var(--accent); }

    .login-title { font-size: 26px; font-weight: 700; margin-bottom: 6px; }
    .login-sub { color: var(--muted); font-size: 14px; font-family: 'JetBrains Mono', monospace; margin-bottom: 32px; }

    .field { margin-bottom: 18px; }
    .field label { display: block; font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    .field input {
      width: 100%;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 13px 16px;
      color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 14px;
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    .field input::placeholder { color: var(--muted); }

    .btn-primary {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, var(--accent), #9b6aff);
      border: none; border-radius: 10px;
      color: #fff; font-family: 'Space Grotesk', sans-serif;
      font-size: 15px; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
      box-shadow: 0 4px 24px var(--accent-glow);
      margin-top: 8px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    .alert {
      border-radius: 8px; padding: 10px 14px;
      font-size: 13px; margin-bottom: 16px; display: none;
      font-family: 'JetBrains Mono', monospace;
    }
    .alert-error { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); color: var(--danger); }
    .alert-warn  { background: rgba(251,191,36,0.1);  border: 1px solid rgba(251,191,36,0.3);  color: var(--warning); }

    /* ══ DASHBOARD ══ */
    #dashScreen { flex-direction: row; align-items: stretch; }

    .sidebar {
      width: 230px; min-height: 100vh;
      background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      padding: 28px 0; flex-shrink: 0;
    }

    .sidebar-logo {
      display: flex; align-items: center; gap: 10px;
      padding: 0 24px 28px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 20px;
    }
    .sidebar-logo .logo-icon { width: 32px; height: 32px; font-size: 15px; }
    .sidebar-logo .logo-text { font-size: 18px; font-weight: 800; }

    .server-badge {
      margin: 0 16px 16px;
      background: rgba(124,106,255,0.1);
      border: 1px solid rgba(124,106,255,0.3);
      border-radius: 10px; padding: 10px 12px;
    }
    .server-badge .label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; font-family: 'JetBrains Mono', monospace; }
    .server-badge .name { font-size: 13px; font-weight: 700; margin-top: 3px; color: var(--accent); }
    .server-badge .expiry { font-size: 10px; color: var(--muted); font-family: 'JetBrains Mono', monospace; margin-top: 2px; }

    .nav-item {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 24px; font-size: 14px; font-weight: 600;
      color: var(--muted); cursor: pointer; transition: all 0.2s;
      border-left: 3px solid transparent;
    }
    .nav-item:hover { color: var(--text); background: var(--surface2); }
    .nav-item.active { color: var(--accent); border-left-color: var(--accent); background: rgba(124,106,255,0.07); }

    .sidebar-bottom { margin-top: auto; padding: 20px 24px 0; border-top: 1px solid var(--border); }
    .user-info { display: flex; align-items: center; gap: 10px; }
    .avatar {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; flex-shrink: 0;
    }
    .user-name { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 120px; }
    .user-role { font-size: 10px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }

    .btn-logout {
      margin-top: 12px; width: 100%; padding: 9px;
      background: transparent; border: 1px solid var(--border);
      border-radius: 8px; color: var(--muted);
      font-family: 'Space Grotesk', sans-serif; font-size: 13px;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-logout:hover { border-color: var(--danger); color: var(--danger); }

    .main { flex: 1; padding: 36px 40px; overflow-y: auto; animation: fadeIn 0.4s ease; }

    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }
    .page-title { font-size: 26px; font-weight: 800; }
    .page-sub { font-size: 13px; color: var(--muted); font-family: 'JetBrains Mono', monospace; margin-top: 3px; }

    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 32px; margin-bottom: 24px;
    }
    .card-title {
      font-size: 15px; font-weight: 700; margin-bottom: 24px;
      display: flex; align-items: center; gap: 8px;
    }
    .badge {
      font-size: 11px; padding: 2px 8px;
      background: rgba(124,106,255,0.15); color: var(--accent);
      border-radius: 99px; font-family: 'JetBrains Mono', monospace; font-weight: 400;
    }
    .badge-green { background: rgba(74,222,128,0.15); color: var(--success); }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    .form-grid .full { grid-column: 1 / -1; }

    .form-field { display: flex; flex-direction: column; gap: 7px; }
    .form-field label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
    .form-field input,
    .form-field select,
    .form-field textarea {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 14px;
      color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 13px;
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-field select option { background: var(--surface2); }
    .form-field input:focus,
    .form-field select:focus,
    .form-field textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    .form-field textarea { resize: vertical; min-height: 80px; }

    .btn-add {
      padding: 10px 20px;
      background: rgba(124,106,255,0.1); border: 1px dashed rgba(124,106,255,0.4);
      border-radius: 10px; color: var(--accent);
      font-family: 'Space Grotesk', sans-serif; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all 0.2s; width: 100%; margin-top: 14px;
    }
    .btn-add:hover { background: rgba(124,106,255,0.2); border-color: var(--accent); }

    .stock-list { display: flex; flex-direction: column; gap: 10px; }

    .stock-item {
      display: flex; align-items: center; gap: 12px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 16px;
      animation: slideIn 0.3s ease;
    }
    .item-name { flex: 1; font-size: 14px; font-weight: 600; }
    .item-qty {
      font-family: 'JetBrains Mono', monospace; font-size: 13px;
      color: var(--accent); background: rgba(124,106,255,0.12);
      padding: 3px 10px; border-radius: 6px;
    }
    .item-server { font-size: 11px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }

    .btn-remove {
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 16px; padding: 2px 6px;
      border-radius: 6px; transition: all 0.2s;
    }
    .btn-remove:hover { background: rgba(248,113,113,0.15); color: var(--danger); }

    .divider { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

    .actions { display: flex; gap: 12px; justify-content: flex-end; }

    .btn-secondary {
      padding: 12px 24px; background: transparent;
      border: 1px solid var(--border); border-radius: 10px;
      color: var(--muted); font-family: 'Space Grotesk', sans-serif;
      font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s;
    }
    .btn-secondary:hover { border-color: var(--text); color: var(--text); }

    .btn-save {
      padding: 12px 32px;
      background: linear-gradient(135deg, var(--accent), #9b6aff);
      border: none; border-radius: 10px; color: #fff;
      font-family: 'Space Grotesk', sans-serif; font-size: 14px; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
      box-shadow: 0 4px 20px var(--accent-glow);
      display: flex; align-items: center; gap: 8px;
    }
    .btn-save:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-save:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .empty { text-align: center; padding: 40px; color: var(--muted); font-family: 'JetBrains Mono', monospace; font-size: 13px; }
    .empty-icon { font-size: 32px; margin-bottom: 12px; }

    .toast {
      position: fixed; bottom: 32px; right: 32px;
      background: var(--surface); border-radius: 12px; padding: 14px 20px;
      font-size: 14px; font-weight: 600;
      display: flex; align-items: center; gap: 10px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      opacity: 0; transform: translateY(10px);
      transition: all 0.3s ease; pointer-events: none; z-index: 999;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    @media (max-width: 700px) {
      .sidebar { display: none; }
      .main { padding: 24px 20px; }
      .form-grid { grid-template-columns: 1fr; }
      .login-card { margin: 20px; padding: 32px 24px; }
    }
  </style>
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>

<!-- ══ LOGIN ══ -->
<div id="loginScreen" class="screen active">
  <div class="login-card">
    <div class="logo">
      <div class="logo-icon">
        <img src="logo.gif" style="width:100%;height:100%;object-fit:cover;border-radius:10px;" onerror="this.style.display='none'"/>
      </div>
      <div class="logo-text">Core Web<span>Panel</span></div>
    </div>
    <div class="login-title">라이선스 로그인</div>
    <div class="login-sub">// 발급받은 라이선스 코드로 로그인하세요</div>

    <div class="alert alert-error" id="loginError"></div>
    <div class="alert alert-warn" id="loginWarn"></div>

    <div class="field">
      <label>라이선스 코드</label>
      <input type="text" id="inputCode" placeholder="예) F7E3A3B645260AF3D1868A193EAE1DD7" autocomplete="off" style="font-size:12px"/>
    </div>
    <button class="btn-primary" id="loginBtn" onclick="doLogin()">
      <span id="loginBtnText">로그인</span>
    </button>
  </div>
</div>

<!-- ══ DASHBOARD ══ -->
<div id="dashScreen" class="screen">
  <div class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">
        <img src="logo.gif" style="width:100%;height:100%;object-fit:cover;border-radius:8px;" onerror="this.style.display='none'"/>
      </div>
      <div class="logo-text">Core Web<span style="color:var(--accent)">Panel</span></div>
    </div>

    <div class="server-badge">
      <div class="label">연결된 서버</div>
      <div class="name" id="serverNameBadge">-</div>
      <div class="expiry" id="serverExpiryBadge"></div>
    </div>

    <div class="nav-item active"><span>📦</span> 재고 관리</div>
    <div class="nav-item"><span>⚙️</span> 설정</div>

    <div class="sidebar-bottom">
      <div class="user-info">
        <div class="avatar" id="avatarLetter">?</div>
        <div>
          <div class="user-name" id="sidebarGuildName">-</div>
          <div class="user-role">// 라이선스 유저</div>
        </div>
      </div>
      <button class="btn-logout" onclick="doLogout()">로그아웃</button>
    </div>
  </div>

  <div class="main">
    <div class="page-header">
      <div>
        <div class="page-title">재고 관리</div>
        <div class="page-sub" id="pageSubTitle">// 서버 재고를 추가하고 저장하세요</div>
      </div>
    </div>

    <!-- 재고 추가 폼 -->
    <div class="card">
      <div class="card-title">📦 재고 추가 <span class="badge">NEW ITEM</span></div>
      <div class="form-grid">
        <div class="form-field">
          <label>서버</label>
          <input type="text" id="serverNameInput" readonly style="color:var(--accent); cursor:not-allowed;"/>
        </div>
        <div class="form-field">
          <label>아이템 이름</label>
          <input type="text" id="itemName" placeholder="예) 다이아몬드"/>
        </div>
        <div class="form-field">
          <label>수량</label>
          <input type="number" id="itemQty" placeholder="0" min="0"/>
        </div>
        <div class="form-field">
          <label>카테고리</label>
          <select id="itemCategory">
            <option value="">카테고리 선택</option>
            <option>광물</option>
            <option>무기</option>
            <option>방어구</option>
            <option>소모품</option>
            <option>블록</option>
            <option>기타</option>
          </select>
        </div>
        <div class="form-field full">
          <label>메모 (선택)</label>
          <textarea id="itemNote" placeholder="추가 설명을 입력하세요..."></textarea>
        </div>
      </div>
      <button class="btn-add" onclick="addItem()">+ 목록에 추가</button>
    </div>

    <!-- 재고 목록 -->
    <div class="card">
      <div class="card-title">
        📋 재고 목록
        <span class="badge" id="itemCountBadge">0개</span>
        <span class="badge badge-green" id="savedBadge" style="display:none">✓ 저장됨</span>
      </div>
      <div class="stock-list" id="stockList">
        <div class="empty"><div class="empty-icon">📭</div>아직 추가된 재고가 없습니다</div>
      </div>
      <hr class="divider"/>
      <div class="actions">
        <button class="btn-secondary" onclick="clearAll()">전체 초기화</button>
        <button class="btn-save" id="saveBtn" onclick="saveStock()">💾 저장하기</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let currentLicense = null;
  let stockItems = [];
  let _dbRef = null;
  let firestoreOps = null;
  // db is initialized via firebaseReady event below

  // Firebase 준비 대기
  window.addEventListener('firebaseReady', () => {
    _dbRef = window._db;
    firestoreOps = window._firestoreOps;
  });

  function waitForFirebase() {
    return new Promise((resolve) => {
      if (window._firebaseReady) return resolve();
      window.addEventListener('firebaseReady', resolve, { once: true });
    });
  }

  // ── 로그인 ──
  async function doLogin() {
    const code = document.getElementById('inputCode').value.trim().toUpperCase();
    const errEl = document.getElementById('loginError');
    const warnEl = document.getElementById('loginWarn');
    const btn = document.getElementById('loginBtn');
    const btnText = document.getElementById('loginBtnText');

    errEl.style.display = 'none';
    warnEl.style.display = 'none';

    if (!code) {
      errEl.textContent = '❌ 라이선스 코드를 입력하세요.';
      errEl.style.display = 'block';
      return;
    }

    // 로딩
    btn.disabled = true;
    btnText.innerHTML = '<div class="spinner"></div> 확인 중...';

    await waitForFirebase();

    try {
      // Firestore에서 코드 검색
      const { collection, getDocs } = firestoreOps;
      const snapshot = await getDocs(collection(_dbRef, 'licenses'));
      let found = null;

      snapshot.forEach(docSnap => {
        const data = docSnap.data();
        if (data.code === code) found = data;
      });

      if (!found) {
        errEl.textContent = '❌ 유효하지 않은 라이선스 코드입니다.';
        errEl.style.display = 'block';
        return;
      }

      if (!found.isActive) {
        errEl.textContent = '❌ 비활성화된 라이선스입니다.';
        errEl.style.display = 'block';
        return;
      }

      if (found.expiresAt && new Date(found.expiresAt) < new Date()) {
        errEl.textContent = '❌ 만료된 라이선스입니다.';
        errEl.style.display = 'block';
        return;
      }

      // 만료 임박 경고 (7일 이내)
      if (found.expiresAt) {
        const daysLeft = Math.ceil((new Date(found.expiresAt) - new Date()) / (1000 * 60 * 60 * 24));
        if (daysLeft <= 7) {
          warnEl.textContent = `⚠️ 라이선스가 ${daysLeft}일 후 만료됩니다.`;
          warnEl.style.display = 'block';
        }
      }

      // 로그인 성공
      currentLicense = found;
      enterDashboard(found);
      await loadInventory(found.guildId);

    } catch (err) {
      console.error(err);
      errEl.textContent = '❌ 서버 오류가 발생했습니다. 잠시 후 다시 시도하세요.';
      errEl.style.display = 'block';
    } finally {
      btn.disabled = false;
      btnText.textContent = '로그인';
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('loginScreen').classList.contains('active')) doLogin();
  });

  function enterDashboard(license) {
    document.getElementById('loginScreen').classList.remove('active');
    document.getElementById('dashScreen').classList.add('active');

    const name = license.guildName || '알 수 없는 서버';
    document.getElementById('serverNameBadge').textContent = name;
    document.getElementById('sidebarGuildName').textContent = name;
    document.getElementById('avatarLetter').textContent = name[0] || '?';
    document.getElementById('serverNameInput').value = name;
    document.getElementById('pageSubTitle').textContent = `// ${name} 서버의 재고를 관리하세요`;

    if (license.expiresAt) {
      const d = new Date(license.expiresAt);
      document.getElementById('serverExpiryBadge').textContent = `만료: ${d.toLocaleDateString('ko-KR')}`;
    } else {
      document.getElementById('serverExpiryBadge').textContent = '영구 라이선스';
    }
  }

  // ── 재고 불러오기 ──
  async function loadInventory(guildId) {
    try {
      const { collection, getDocs } = firestoreOps;
      const snapshot = await getDocs(collection(_dbRef, 'inventory', guildId, 'items'));
      stockItems = [];
      snapshot.forEach(docSnap => {
        stockItems.push({ ...docSnap.data(), id: docSnap.id });
      });
      renderList();
      if (stockItems.length > 0) {
        document.getElementById('savedBadge').style.display = 'inline';
      }
    } catch (err) {
      console.error('재고 불러오기 오류:', err);
    }
  }

  // ── 재고 추가 ──
  function addItem() {
    const name = document.getElementById('itemName').value.trim();
    const qty  = document.getElementById('itemQty').value;
    const cat  = document.getElementById('itemCategory').value;
    const note = document.getElementById('itemNote').value.trim();

    if (!name || !qty) {
      showToast('⚠️ 아이템 이름과 수량은 필수입니다!', true);
      return;
    }

    stockItems.push({
      id: Date.now().toString(),
      serverName: currentLicense.guildName,
      guildId: currentLicense.guildId,
      name, qty: parseInt(qty), cat, note,
      addedAt: new Date().toISOString()
    });

    renderList();
    document.getElementById('itemName').value = '';
    document.getElementById('itemQty').value = '';
    document.getElementById('itemCategory').value = '';
    document.getElementById('itemNote').value = '';
    document.getElementById('savedBadge').style.display = 'none';
  }

  function removeItem(id) {
    stockItems = stockItems.filter(i => i.id !== id);
    renderList();
    document.getElementById('savedBadge').style.display = 'none';
  }

  function clearAll() {
    if (!stockItems.length) return;
    if (confirm('전체 목록을 초기화할까요?')) {
      stockItems = [];
      renderList();
      document.getElementById('savedBadge').style.display = 'none';
    }
  }

  function renderList() {
    const list = document.getElementById('stockList');
    document.getElementById('itemCountBadge').textContent = stockItems.length + '개';

    if (!stockItems.length) {
      list.innerHTML = '<div class="empty"><div class="empty-icon">📭</div>아직 추가된 재고가 없습니다</div>';
      return;
    }

    list.innerHTML = stockItems.map(i => `
      <div class="stock-item">
        <div style="flex:1">
          <div class="item-name">${i.name}${i.cat ? ' <span style="font-size:11px;color:var(--muted)">['+i.cat+']</span>' : ''}</div>
          ${i.note ? '<div style="font-size:11px;color:var(--muted);font-family:DM Mono,monospace;margin-top:3px">'+i.note+'</div>' : ''}
        </div>
        <span class="item-server">${i.serverName || ''}</span>
        <span class="item-qty">x${i.qty}</span>
        <button class="btn-remove" onclick="removeItem('${i.id}')">✕</button>
      </div>`).join('');
  }

  // ── 저장하기 ──
  async function saveStock() {
    if (!stockItems.length) {
      showToast('⚠️ 저장할 재고가 없습니다!', true);
      return;
    }

    const btn = document.getElementById('saveBtn');
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div> 저장 중...';

    try {
      const { collection, setDoc, doc, getDocs, deleteDoc } = firestoreOps;
      const guildId = currentLicense.guildId;
      const colRef = collection(_dbRef, 'inventory', guildId, 'items');

      // 기존 데이터 전체 삭제
      const existing = await getDocs(colRef);
      for (const d of existing.docs) {
        await deleteDoc(d.ref);
      }

      // 새 데이터 저장
      for (const item of stockItems) {
        await setDoc(doc(colRef, item.id), item);
      }

      document.getElementById('savedBadge').style.display = 'inline';
      showToast(`💾 재고가 저장되었습니다! (${stockItems.length}개 항목)`);
    } catch (err) {
      console.error(err);
      showToast('❌ 저장 중 오류가 발생했습니다.', true);
    } finally {
      btn.disabled = false;
      btn.innerHTML = '💾 저장하기';
    }
  }

  // ── 로그아웃 ──
  function doLogout() {
    currentLicense = null;
    stockItems = [];
    document.getElementById('dashScreen').classList.remove('active');
    document.getElementById('loginScreen').classList.add('active');
    document.getElementById('inputCode').value = '';
    document.getElementById('loginError').style.display = 'none';
    document.getElementById('loginWarn').style.display = 'none';
    renderList();
  }

  function showToast(msg, warn = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.borderColor = warn ? 'var(--danger)' : 'var(--success)';
    t.style.color = warn ? 'var(--danger)' : 'var(--success)';
    t.style.border = `1px solid ${warn ? 'var(--danger)' : 'var(--success)'}`;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }
</script>
</body>
</html>
