<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Core Web Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, setDoc, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    const firebaseConfig = {
      apiKey: "AIzaSyD9AFpU-tlO487wKNQ83fct9_hw_4Tu-3k",
      authDomain: "web-panel-5b06d.firebaseapp.com",
      projectId: "web-panel-5b06d",
      storageBucket: "web-panel-5b06d.firebasestorage.app",
      messagingSenderId: "680917315874",
      appId: "1:680917315874:web:73e33d46b7f8b13972357b"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    window._db = db;
    window._firestoreOps = { doc, getDoc, collection, setDoc, getDocs, deleteDoc };
    window._firebaseReady = true;
    window.dispatchEvent(new Event('firebaseReady'));
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d0d;
      --surface: #141414;
      --surface2: #1a1a1a;
      --surface3: #202020;
      --border: #262626;
      --border2: #303030;
      --text: #f0f0f0;
      --text2: #909090;
      --text3: #555555;
      --success: #4ade80;
      --danger: #f87171;
      --warning: #fbbf24;
    }

    /* ✅ 수정: body overflow:hidden → overflow-x:hidden (세로 스크롤 허용) */
    body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    @keyframes spin { to { transform:rotate(360deg); } }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
    .screen { display:none; width:100%; min-height:100vh; }
    .screen.active { display:flex; }

    /* LOGIN */
    #loginScreen {
      align-items:center; justify-content:center; position:relative;
      background: url('logo.gif') center/cover no-repeat fixed;
    }
    #loginScreen::before {
      content:''; position:absolute; inset:0;
      background:rgba(0,0,0,0.75); backdrop-filter:blur(3px);
    }
    .login-card {
      position:relative; z-index:1;
      background:rgba(12,12,12,0.94); border:1px solid var(--border2);
      border-radius:16px; padding:44px 40px; width:100%; max-width:420px;
      animation:fadeUp 0.45s ease; backdrop-filter:blur(20px);
      box-shadow:0 32px 80px rgba(0,0,0,0.7);
    }
    .login-brand { display:flex; align-items:center; gap:11px; margin-bottom:30px; }
    .login-brand-icon { width:36px; height:36px; border-radius:9px; overflow:hidden; background:var(--surface3); flex-shrink:0; }
    .login-brand-icon img { width:100%; height:100%; object-fit:cover; }
    .login-brand-name { font-size:18px; font-weight:700; letter-spacing:-0.02em; }
    .login-brand-name span { color:var(--text2); font-weight:400; }
    .login-title { font-size:24px; font-weight:700; letter-spacing:-0.02em; margin-bottom:5px; }
    .login-sub { font-size:12px; color:var(--text2); font-family:'JetBrains Mono',monospace; margin-bottom:26px; }
    .field { margin-bottom:14px; }
    .field label { display:block; font-size:11px; font-weight:600; letter-spacing:0.07em; text-transform:uppercase; color:var(--text3); margin-bottom:6px; }
    .field input { width:100%; background:var(--surface2); border:1px solid var(--border2); border-radius:9px; padding:12px 14px; color:var(--text); font-family:'JetBrains Mono',monospace; font-size:12px; outline:none; transition:border-color 0.15s,box-shadow 0.15s; }
    .field input:focus { border-color:rgba(255,255,255,0.35); box-shadow:0 0 0 3px rgba(255,255,255,0.04); }
    .field input::placeholder { color:var(--text3); }
    .btn-login { width:100%; padding:13px; background:var(--text); border:none; border-radius:9px; color:#000; font-family:'Outfit',sans-serif; font-size:14px; font-weight:700; cursor:pointer; transition:all 0.15s; margin-top:6px; display:flex; align-items:center; justify-content:center; gap:8px; }
    .btn-login:hover { background:#d8d8d8; }
    .btn-login:disabled { opacity:0.5; cursor:not-allowed; }
    .alert { border-radius:8px; padding:10px 13px; font-size:12px; margin-bottom:14px; display:none; font-family:'JetBrains Mono',monospace; }
    .alert-error { background:rgba(248,113,113,0.08); border:1px solid rgba(248,113,113,0.25); color:var(--danger); }
    .alert-warn { background:rgba(251,191,36,0.08); border:1px solid rgba(251,191,36,0.25); color:var(--warning); }
    .spinner { width:15px; height:15px; border:2px solid rgba(0,0,0,0.2); border-top-color:#000; border-radius:50%; animation:spin 0.6s linear infinite; }

    /* ✅ 수정: 대시보드 화면 높이 고정 + overflow:hidden으로 내부 스크롤 영역 확보 */
    #dashScreen { flex-direction:row; align-items:stretch; height:100vh; overflow:hidden; }

    /* SIDEBAR */
    /* ✅ 수정: 사이드바 자체 스크롤 허용 */
    .sidebar { width:220px; height:100vh; flex-shrink:0; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; padding:20px 0; animation:fadeIn 0.35s ease; overflow-y:auto; }
    .sidebar-brand { display:flex; align-items:center; gap:10px; padding:0 16px 18px; border-bottom:1px solid var(--border); margin-bottom:10px; }
    .sidebar-brand-icon { width:30px; height:30px; border-radius:7px; overflow:hidden; background:var(--surface3); flex-shrink:0; }
    .sidebar-brand-icon img { width:100%; height:100%; object-fit:cover; }
    .sidebar-brand-name { font-size:14px; font-weight:700; letter-spacing:-0.02em; white-space:nowrap; }
    .sidebar-brand-name span { color:var(--text2); font-weight:400; }
    .server-chip { margin:0 10px 14px; background:var(--surface2); border:1px solid var(--border); border-radius:9px; padding:9px 11px; }
    .server-chip .chip-label { font-size:10px; color:var(--text3); text-transform:uppercase; letter-spacing:0.07em; font-family:'JetBrains Mono',monospace; }
    .server-chip .chip-name { font-size:13px; font-weight:600; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .server-chip .chip-exp { font-size:10px; color:var(--text3); font-family:'JetBrains Mono',monospace; margin-top:1px; }
    .nav-section { padding:0 10px 4px; }
    .nav-section-label { font-size:10px; color:var(--text3); text-transform:uppercase; letter-spacing:0.08em; padding:8px 8px 4px; font-family:'JetBrains Mono',monospace; }
    .nav-item { display:flex; align-items:center; gap:9px; padding:9px 10px; border-radius:8px; font-size:13px; font-weight:500; color:var(--text2); cursor:pointer; transition:all 0.15s; margin-bottom:1px; }
    .nav-item:hover { background:var(--surface2); color:var(--text); }
    .nav-item.active { background:rgba(255,255,255,0.07); color:var(--text); font-weight:600; }
    .nav-icon { font-size:14px; width:18px; text-align:center; flex-shrink:0; }
    .sidebar-footer { margin-top:auto; padding:14px 10px 0; border-top:1px solid var(--border); }
    .user-row { display:flex; align-items:center; gap:9px; padding:0 4px; margin-bottom:10px; }
    .user-avatar { width:30px; height:30px; border-radius:50%; flex-shrink:0; background:var(--surface3); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; border:1px solid var(--border2); }
    .user-name { font-size:12px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .user-role { font-size:10px; color:var(--text3); font-family:'JetBrains Mono',monospace; }
    .btn-logout { width:100%; padding:8px; background:transparent; border:1px solid var(--border); border-radius:7px; color:var(--text3); font-family:'Outfit',sans-serif; font-size:12px; cursor:pointer; transition:all 0.15s; }
    .btn-logout:hover { border-color:var(--danger); color:var(--danger); }

    /* ✅ 수정: .main에 height:100vh 추가 → overflow-y:auto가 제대로 작동해 스크롤 가능 */
    .main { flex:1; overflow-y:auto; background:#181818; height:100vh; }
    .main-inner { padding:30px 34px; max-width:960px; }
    .page-header { margin-bottom:24px; }
    .page-title { font-size:21px; font-weight:700; letter-spacing:-0.02em; }
    .page-sub { font-size:11px; color:var(--text3); font-family:'JetBrains Mono',monospace; margin-top:4px; }

    /* CARDS */
    .card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:22px; margin-bottom:16px; }
    .card-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; }
    .card-title { font-size:13px; font-weight:600; display:flex; align-items:center; gap:8px; }
    .tag { font-size:10px; padding:2px 7px; border-radius:99px; font-family:'JetBrains Mono',monospace; font-weight:400; background:var(--surface2); color:var(--text2); border:1px solid var(--border); }

    /* FORMS */
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .form-row.full { grid-column:1/-1; }
    .form-field { display:flex; flex-direction:column; gap:6px; margin-bottom:12px; }
    .form-field label { font-size:11px; font-weight:600; letter-spacing:0.07em; text-transform:uppercase; color:var(--text3); }
    .form-field input,.form-field select,.form-field textarea { background:var(--surface2); border:1px solid var(--border2); border-radius:8px; padding:10px 12px; color:var(--text); font-family:'JetBrains Mono',monospace; font-size:12px; outline:none; transition:border-color 0.15s,box-shadow 0.15s; }
    .form-field select option { background:var(--surface2); }
    .form-field input:focus,.form-field select:focus,.form-field textarea:focus { border-color:rgba(255,255,255,0.3); box-shadow:0 0 0 3px rgba(255,255,255,0.04); }
    .form-field input::placeholder,.form-field textarea::placeholder { color:var(--text3); }
    .form-field textarea { resize:vertical; min-height:80px; }

    /* BUTTONS */
    .btn { display:inline-flex; align-items:center; justify-content:center; gap:6px; border:none; border-radius:8px; cursor:pointer; font-family:'Outfit',sans-serif; font-weight:600; transition:all 0.15s; }
    .btn:disabled { opacity:0.4; cursor:not-allowed; }
    .btn-sm { padding:6px 13px; font-size:12px; }
    .btn-md { padding:9px 18px; font-size:13px; }
    .btn-white { background:var(--text); color:#000; }
    .btn-white:hover:not(:disabled) { background:#d4d4d4; }
    .btn-ghost { background:transparent; color:var(--text2); border:1px solid var(--border2); }
    .btn-ghost:hover:not(:disabled) { border-color:rgba(255,255,255,0.3); color:var(--text); }
    .btn-red-ghost { background:transparent; color:var(--text3); border:1px solid var(--border); }
    .btn-red-ghost:hover:not(:disabled) { border-color:var(--danger); color:var(--danger); }
    .btn-dashed { padding:9px; background:var(--surface2); border:1px dashed var(--border2); border-radius:8px; color:var(--text2); font-family:'Outfit',sans-serif; font-size:12px; font-weight:600; cursor:pointer; transition:all 0.15s; width:100%; margin-top:10px; display:flex; align-items:center; justify-content:center; gap:6px; }
    .btn-dashed:hover { border-color:rgba(255,255,255,0.25); color:var(--text); }

    /* LIST */
    .list-item { display:flex; align-items:center; gap:12px; background:var(--surface2); border:1px solid var(--border); border-radius:9px; padding:11px 14px; margin-bottom:7px; transition:border-color 0.15s; }
    .list-item:last-child { margin-bottom:0; }
    .list-item:hover { border-color:var(--border2); }
    .item-name { flex:1; font-size:13px; font-weight:600; }
    .item-meta { font-size:11px; color:var(--text3); font-family:'JetBrains Mono',monospace; }
    .item-qty { font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--text); background:var(--surface3); padding:3px 9px; border-radius:5px; border:1px solid var(--border); }
    .empty-state { text-align:center; padding:32px 20px; }
    .empty-icon { font-size:26px; margin-bottom:8px; }
    .empty-title { font-size:13px; color:var(--text2); font-weight:500; }
    .empty-desc { font-size:11px; color:var(--text3); font-family:'JetBrains Mono',monospace; margin-top:4px; }
    .divider { border:none; border-top:1px solid var(--border); margin:18px 0; }
    .actions-bar { display:flex; gap:10px; justify-content:flex-end; }

    /* TABS */
    .tabs { display:flex; gap:2px; margin-bottom:20px; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:3px; }
    .tab { flex:1; padding:8px 10px; border-radius:7px; font-size:12px; font-weight:600; text-align:center; cursor:pointer; transition:all 0.15s; color:var(--text3); }
    .tab:hover { color:var(--text2); }
    .tab.active { background:var(--surface2); color:var(--text); border:1px solid var(--border2); }
    .tab-section { display:none; }
    .tab-section.active { display:block; animation:fadeUp 0.25s ease; }

    /* SETTINGS LAYOUT */
    .settings-layout { display:grid; grid-template-columns:1fr 340px; gap:18px; align-items:start; }
    .vending-preview { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; position:sticky; top:30px; }
    .preview-header { padding:11px 14px; border-bottom:1px solid var(--border); font-size:11px; color:var(--text3); font-family:'JetBrains Mono',monospace; display:flex; align-items:center; gap:7px; }
    .preview-dot { width:7px; height:7px; border-radius:50%; background:var(--success); animation:pulse 2s infinite; }
    .discord-mock { padding:16px; background:#313338; }
    .discord-msg { display:flex; gap:12px; }
    .discord-avatar { width:38px; height:38px; border-radius:50%; flex-shrink:0; background:#5865f2; display:flex; align-items:center; justify-content:center; font-size:18px; }
    .discord-body { flex:1; }
    .discord-username { font-size:14px; font-weight:600; color:#fff; margin-bottom:4px; }
    .discord-username span { font-size:11px; font-weight:400; color:#949ba4; margin-left:6px; }
    .discord-embed { background:#2b2d31; border:1px solid #3f4147; border-radius:4px; border-left:4px solid #5865f2; padding:12px 14px; margin-top:4px; }
    .discord-embed-title { font-size:14px; font-weight:700; color:#fff; margin-bottom:6px; }
    .discord-embed-desc { font-size:13px; color:#dbdee1; line-height:1.5; margin-bottom:10px; white-space:pre-wrap; word-break:break-word; }
    .discord-buttons { display:flex; flex-wrap:wrap; gap:6px; }
    .discord-btn { display:flex; align-items:center; gap:4px; background:#4e5058; border-radius:4px; padding:5px 12px; font-size:13px; color:#dbdee1; font-weight:500; }

    /* BUTTON EDITOR ROW */
    .btn-edit-row { display:flex; gap:7px; align-items:center; margin-bottom:8px; }
    .btn-edit-emoji { width:46px; background:var(--surface2); border:1px solid var(--border2); border-radius:7px; padding:8px; color:var(--text); font-size:13px; outline:none; text-align:center; }
    .btn-edit-label { flex:1; background:var(--surface2); border:1px solid var(--border2); border-radius:7px; padding:8px 10px; color:var(--text); font-family:'JetBrains Mono',monospace; font-size:12px; outline:none; }
    .btn-edit-emoji:focus,.btn-edit-label:focus { border-color:rgba(255,255,255,0.3); }

    /* MODAL */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.72); backdrop-filter:blur(4px); z-index:1000; align-items:center; justify-content:center; }
    .modal-overlay.open { display:flex; animation:fadeIn 0.2s ease; }
    .modal { background:var(--surface); border:1px solid var(--border2); border-radius:14px; padding:26px; width:100%; max-width:420px; animation:fadeUp 0.22s ease; box-shadow:0 24px 60px rgba(0,0,0,0.6); }
    .modal-title { font-size:15px; font-weight:700; margin-bottom:18px; }
    .modal-footer { display:flex; gap:10px; justify-content:flex-end; margin-top:22px; }

    /* TOAST */
    .toast { position:fixed; bottom:26px; right:26px; background:var(--surface); border:1px solid var(--border2); border-radius:10px; padding:11px 17px; font-size:13px; font-weight:500; box-shadow:0 8px 30px rgba(0,0,0,0.5); opacity:0; transform:translateY(8px); transition:all 0.25s ease; pointer-events:none; z-index:9999; }
    .toast.show { opacity:1; transform:translateY(0); }

    @media (max-width:780px) {
      .sidebar { display:none; }
      .main-inner { padding:18px 16px; }
      .settings-layout { grid-template-columns:1fr; }
    }

    /* ── DASHBOARD ── */
    .dash-hero { border-radius:14px; padding:28px; background:linear-gradient(135deg,#071a0d 0%,#0a1a10 60%,#0d0d0d 100%); border:1px solid #1e3d26; position:relative; overflow:hidden; margin-bottom:16px; }
    .dash-hero::after { content:''; position:absolute; right:-40px; top:-40px; width:200px; height:200px; background:radial-gradient(circle,rgba(74,222,128,0.08) 0%,transparent 70%); pointer-events:none; }
    .dash-hero-icon { width:44px; height:44px; border-radius:12px; background:rgba(74,222,128,0.18); border:1px solid rgba(74,222,128,0.3); display:flex; align-items:center; justify-content:center; font-size:22px; margin-bottom:14px; }
    .dash-hero-label { font-size:11px; color:rgba(74,222,128,0.6); font-family:'JetBrains Mono',monospace; text-transform:uppercase; letter-spacing:0.1em; margin-bottom:6px; }
    .dash-hero-value { font-size:36px; font-weight:800; letter-spacing:-0.03em; color:#4ade80; }
    .dash-hero-sub { font-size:11px; color:var(--text3); font-family:'JetBrains Mono',monospace; margin-top:6px; }
    .dash-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px; margin-bottom:16px; }
    .dash-stat { border-radius:12px; padding:20px 22px; position:relative; overflow:hidden; border:1px solid; transition:transform 0.15s; }
    .dash-stat:hover { transform:translateY(-1px); }
    .dash-stat.blue { background:linear-gradient(135deg,#080d1f,#0d0d18); border-color:#1a2550; }
    .dash-stat.purple { background:linear-gradient(135deg,#0e0820,#0d0d18); border-color:#2a1850; }
    .dash-stat.orange { background:linear-gradient(135deg,#1a0e00,#120d00); border-color:#3d2200; }
    .dash-stat-label { font-size:11px; color:var(--text3); font-family:'JetBrains Mono',monospace; margin-bottom:10px; display:flex; align-items:center; justify-content:space-between; }
    .dash-stat-dollar { font-size:18px; opacity:0.4; }
    .dash-stat-value { font-size:24px; font-weight:700; letter-spacing:-0.02em; }
    .dash-stat-change { font-size:11px; font-family:'JetBrains Mono',monospace; margin-top:8px; display:flex; align-items:center; gap:5px; }
    .dash-stat-change.up { color:#4ade80; }
    .dash-stat-change.down { color:#f87171; }
    .dash-stat-change.neutral { color:var(--text3); }
    .chart-wrap { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:22px; margin-bottom:16px; }
    .chart-label { font-size:13px; font-weight:600; color:var(--text2); margin-bottom:18px; }
    .chart-box { position:relative; height:190px; }
    .dash-row { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:16px; }
    .dash-rank { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--border); }
    .dash-rank:last-child { border-bottom:none; }
    .dash-rank-num { font-size:11px; font-family:'JetBrains Mono',monospace; color:var(--text3); width:20px; flex-shrink:0; }
    .dash-rank-name { flex:1; font-size:13px; font-weight:500; }
    .dash-rank-val { font-size:12px; font-family:'JetBrains Mono',monospace; color:var(--text2); }
    .dash-empty { text-align:center; padding:24px; color:var(--text3); font-size:12px; font-family:'JetBrains Mono',monospace; }

  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="screen active">
  <div class="login-card">
    <div class="login-brand">
      <div class="login-brand-icon">
        <img src="logo.gif" onerror="this.parentElement.textContent='⚙️'"/>
      </div>
      <div class="login-brand-name">Core Web<span>Panel</span></div>
    </div>
    <div class="login-title">라이선스 로그인</div>
    <div class="login-sub">// 발급받은 코드로 로그인하세요</div>
    <div class="alert alert-error" id="loginError"></div>
    <div class="alert alert-warn" id="loginWarn"></div>
    <div class="field">
      <label>라이선스 코드</label>
      <input type="text" id="inputCode" placeholder="예) F7E3A3B645260AF3D1868A193EAE1DD7" autocomplete="off"/>
    </div>
    <button class="btn-login" id="loginBtn" onclick="doLogin()">
      <span id="loginBtnText">로그인</span>
    </button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashScreen" class="screen">
  <div class="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-brand-icon">
        <img src="logo.gif" onerror="this.parentElement.textContent='⚙️'" style="width:100%;height:100%;object-fit:cover;border-radius:7px;"/>
      </div>
      <div class="sidebar-brand-name">Core Web<span>Panel</span></div>
    </div>
    <div class="server-chip">
      <div class="chip-label">연결된 서버</div>
      <div class="chip-name" id="serverNameBadge">-</div>
      <div class="chip-exp" id="serverExpiryBadge"></div>
    </div>
    <div class="nav-section">
      <div class="nav-section-label">메뉴</div>
      <div class="nav-item active" onclick="showPage('dashboard')" id="nav-dashboard">
        <span class="nav-icon">📊</span> 대시보드
      </div>
      <div class="nav-item" onclick="showPage('inventory')" id="nav-inventory">
        <span class="nav-icon">📦</span> 재고 관리
      </div>
      <div class="nav-item" onclick="showPage('settings')" id="nav-settings">
        <span class="nav-icon">⚙️</span> 설정
      </div>
    </div>
    <div class="sidebar-footer">
      <div class="user-row">
        <div class="user-avatar" id="avatarLetter">?</div>
        <div>
          <div class="user-name" id="sidebarGuildName">-</div>
          <div class="user-role">// 라이선스 유저</div>
        </div>
      </div>
      <button class="btn-logout" onclick="doLogout()">로그아웃</button>
    </div>
  </div>

  <div class="main">
    <div class="main-inner" id="mainContent"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- MODAL: Category -->
<div class="modal-overlay" id="modalCat">
  <div class="modal">
    <div class="modal-title">카테고리 추가</div>
    <div class="form-field">
      <label>카테고리 이름</label>
      <input type="text" id="catNameInput" placeholder="예) 광물, 무기, 소모품"/>
    </div>
    <div class="form-field">
      <label>이모지 (선택)</label>
      <input type="text" id="catEmojiInput" placeholder="예) 💎"/>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost btn-md" onclick="closeModal('modalCat')">취소</button>
      <button class="btn btn-white btn-md" onclick="saveCategory()">추가하기</button>
    </div>
  </div>
</div>

<!-- MODAL: Product -->
<div class="modal-overlay" id="modalProd">
  <div class="modal">
    <div class="modal-title">제품 추가</div>
    <div class="form-field">
      <label>카테고리</label>
      <select id="prodCatSel"></select>
    </div>
    <div class="form-field">
      <label>제품 이름</label>
      <input type="text" id="prodNameInput" placeholder="예) 다이아몬드 검"/>
    </div>
    <div class="form-field">
      <label>설명 (선택)</label>
      <input type="text" id="prodDescInput" placeholder="예) 최강의 무기"/>
    </div>
    <div class="form-field">
      <label>가격</label>
      <input type="number" id="prodPriceInput" placeholder="0" min="0"/>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost btn-md" onclick="closeModal('modalProd')">취소</button>
      <button class="btn btn-white btn-md" onclick="saveProduct()">추가하기</button>
    </div>
  </div>
</div>

<!-- MODAL: Stock -->
<div class="modal-overlay" id="modalStock">
  <div class="modal">
    <div class="modal-title">재고 추가</div>
    <div class="form-field">
      <label>제품 선택</label>
      <select id="stockProdSel"></select>
    </div>
    <div class="form-field">
      <label>수량</label>
      <input type="number" id="stockQtyInput" placeholder="0" min="1"/>
    </div>
    <div class="form-field">
      <label>재고 내용 (DM으로 전달될 내용)</label>
      <input type="text" id="stockNoteInput" placeholder="예) 계정: test@test.com / 비번: 1234"/>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost btn-md" onclick="closeModal('modalStock')">취소</button>
      <button class="btn btn-white btn-md" onclick="saveStock()">추가하기</button>
    </div>
  </div>
</div>

<script>
  /* STATE */
  let currentLicense = null;
  let _dbRef = null;
  let firestoreOps = null;
  let categories = [];
  let products = [];
  let stockItems = [];
  let vendingSettings = {
    title: 'Vending | 구매하기',
    desc: '아래 버튼을 눌러 자판기를 이용해주세요!',
    buttons: [
      {emoji:'🖊️', label:'구매'},
      {emoji:'🧭', label:'제품'},
      {emoji:'🎁', label:'충전'},
      {emoji:'👤', label:'정보'},
      {emoji:'📢', label:'공지'},
    ]
  };

  window.addEventListener('firebaseReady', () => {
    _dbRef = window._db;
    firestoreOps = window._firestoreOps;
  });

  function waitForFirebase() {
    return new Promise(r => {
      if (window._firebaseReady) return r();
      window.addEventListener('firebaseReady', r, { once: true });
    });
  }

  /* ── LOGIN ── */
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('loginScreen').classList.contains('active')) doLogin();
  });

  async function doLogin() {
    const code = document.getElementById('inputCode').value.trim().toUpperCase();
    const errEl = document.getElementById('loginError');
    const warnEl = document.getElementById('loginWarn');
    const btn = document.getElementById('loginBtn');
    const btnText = document.getElementById('loginBtnText');
    errEl.style.display = 'none'; warnEl.style.display = 'none';
    if (!code) { errEl.textContent = '❌ 라이선스 코드를 입력하세요.'; errEl.style.display = 'block'; return; }
    btn.disabled = true;
    btnText.innerHTML = '<div class="spinner"></div>';
    await waitForFirebase();
    try {
      const { collection, getDocs } = firestoreOps;
      const snap = await getDocs(collection(_dbRef, 'licenses'));
      let found = null;
      snap.forEach(d => { if (d.data().code === code) { found = d.data(); if (!found.guildId) found.guildId = d.id; } });
      if (!found) { errEl.textContent = '❌ 유효하지 않은 라이선스 코드입니다.'; errEl.style.display = 'block'; return; }
      if (!found.isActive) { errEl.textContent = '❌ 비활성화된 라이선스입니다.'; errEl.style.display = 'block'; return; }
      if (found.expiresAt && new Date(found.expiresAt) < new Date()) { errEl.textContent = '❌ 만료된 라이선스입니다.'; errEl.style.display = 'block'; return; }
      if (found.expiresAt) {
        const d = Math.ceil((new Date(found.expiresAt) - new Date()) / 86400000);
        if (d <= 7) { warnEl.textContent = `⚠️ ${d}일 후 만료됩니다.`; warnEl.style.display = 'block'; }
      }
      currentLicense = found;
      await loadAllData(found.guildId);
      enterDashboard(found);
    } catch(e) { console.error(e); errEl.textContent = '❌ 서버 오류가 발생했습니다.'; errEl.style.display = 'block'; }
    finally { btn.disabled = false; btnText.textContent = '로그인'; }
  }

  function enterDashboard(license) {
    document.getElementById('loginScreen').classList.remove('active');
    document.getElementById('dashScreen').classList.add('active');
    const name = license.guildName || '알 수 없는 서버';
    document.getElementById('serverNameBadge').textContent = name;
    document.getElementById('sidebarGuildName').textContent = name;
    document.getElementById('avatarLetter').textContent = name[0] || '?';
    document.getElementById('serverExpiryBadge').textContent = license.expiresAt
      ? `만료: ${new Date(license.expiresAt).toLocaleDateString('ko-KR')}`
      : '영구 라이선스';
    showPage('dashboard');
  }

  function doLogout() {
    currentLicense = null; categories = []; products = []; stockItems = [];
    document.getElementById('dashScreen').classList.remove('active');
    document.getElementById('loginScreen').classList.add('active');
    document.getElementById('inputCode').value = '';
    document.getElementById('loginError').style.display = 'none';
    document.getElementById('loginWarn').style.display = 'none';
  }

  /* ── DATA ── */
  async function loadAllData(guildId) {
    try {
      const { collection, getDocs, doc, getDoc } = firestoreOps;
      const [catSnap, prodSnap, stockSnap] = await Promise.all([
        getDocs(collection(_dbRef, 'inventory', guildId, 'categories')),
        getDocs(collection(_dbRef, 'inventory', guildId, 'products')),
        getDocs(collection(_dbRef, 'inventory', guildId, 'stock')),
      ]);
      categories = []; catSnap.forEach(d => categories.push({...d.data(), id: d.id}));
      products = []; prodSnap.forEach(d => products.push({...d.data(), id: d.id}));
      stockItems = []; stockSnap.forEach(d => stockItems.push({...d.data(), id: d.id}));
      try {
        const sd = await getDoc(doc(_dbRef, 'inventory', guildId, 'settings', 'vending'));
        if (sd.exists()) Object.assign(vendingSettings, sd.data());
      } catch(e) {}
    } catch(e) { console.error('로드 오류:', e); }
    await loadDiscordData();
  }

  /* ── ROUTING ── */
  function showPage(page) {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    const navEl = document.getElementById('nav-' + page);
    if (navEl) navEl.classList.add('active');
    const mc = document.getElementById('mainContent');
    if (page === 'dashboard') { mc.innerHTML = buildDashboardPage(); initDashboard(); }
    if (page === 'inventory') mc.innerHTML = buildInventoryPage();
    if (page === 'settings') mc.innerHTML = buildSettingsPage();
    // ✅ 페이지 전환 시 스크롤 맨 위로
    const main = document.querySelector('.main');
    if (main) main.scrollTop = 0;
  }

  /* ── INVENTORY PAGE ── */
  function buildInventoryPage() {
    return `
      <div class="page-header">
        <div class="page-title">재고 관리</div>
        <div class="page-sub">// 카테고리 → 제품 → 재고 순서로 추가하세요</div>
      </div>
      <div class="tabs">
        <div class="tab active" onclick="switchTab('cat',this)">📂 카테고리</div>
        <div class="tab" onclick="switchTab('prod',this)">📦 제품</div>
        <div class="tab" onclick="switchTab('stock',this)">📋 재고</div>
      </div>
      <div class="tab-section active" id="tab-cat">${buildCatSection()}</div>
      <div class="tab-section" id="tab-prod">${buildProdSection()}</div>
      <div class="tab-section" id="tab-stock">${buildStockSection()}</div>
    `;
  }

  function switchTab(id, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-section').forEach(s => s.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('tab-' + id).classList.add('active');
  }

  function buildCatSection() {
    const items = categories.map(cat => `
      <div class="list-item">
        <span style="font-size:17px">${cat.emoji||'📁'}</span>
        <div class="item-name">${esc(cat.name)}</div>
        <div class="item-meta">${products.filter(p=>p.catId===cat.id).length}개 제품</div>
        <button class="btn btn-red-ghost btn-sm" onclick="deleteCategory('${cat.id}')">삭제</button>
      </div>`).join('');
    return `
      <div class="card">
        <div class="card-header">
          <div class="card-title">📂 카테고리 <span class="tag">${categories.length}개</span></div>
          <button class="btn btn-white btn-sm" onclick="openModal('modalCat')">+ 추가</button>
        </div>
        ${categories.length ? items : emptyState('📂','카테고리가 없습니다','카테고리를 먼저 추가하세요')}
      </div>`;
  }

  function buildProdSection() {
    if (!categories.length) return `<div class="card">${emptyState('⚠️','카테고리를 먼저 추가해주세요','카테고리 탭에서 추가하세요')}</div>`;
    const items = products.map(p => {
      const cat = categories.find(c => c.id === p.catId);
      return `
        <div class="list-item">
          <span style="font-size:16px">${cat?.emoji||'📦'}</span>
          <div style="flex:1">
            <div class="item-name">${esc(p.name)}</div>
            ${p.desc ? `<div class="item-meta">${esc(p.desc)}</div>` : ''}
          </div>
          <div class="item-meta">${esc(cat?.name||'-')}</div>
          ${p.price ? `<div class="item-qty">${Number(p.price).toLocaleString()}원</div>` : ''}
          <button class="btn btn-red-ghost btn-sm" onclick="deleteProduct('${p.id}')">삭제</button>
        </div>`;
    }).join('');
    return `
      <div class="card">
        <div class="card-header">
          <div class="card-title">📦 제품 <span class="tag">${products.length}개</span></div>
          <button class="btn btn-white btn-sm" onclick="openModalProd()">+ 추가</button>
        </div>
        ${products.length ? items : emptyState('📭','제품이 없습니다','제품을 추가해주세요')}
      </div>`;
  }

  function buildStockSection() {
    if (!products.length) return `<div class="card">${emptyState('⚠️','제품을 먼저 추가해주세요','제품 탭에서 추가하세요')}</div>`;
    const items = stockItems.map(item => {
      const prod = products.find(p => p.id === item.prodId);
      const cat = prod ? categories.find(c => c.id === prod.catId) : null;
      return `
        <div class="list-item">
          <span style="font-size:16px">${cat?.emoji||'📦'}</span>
          <div style="flex:1">
            <div class="item-name">${esc(prod?.name||'알 수 없음')}</div>
            ${item.note ? `<div class="item-meta">📦 ${esc(item.note)}</div>` : ''}
          </div>
          <div class="item-meta">${esc(cat?.name||'-')}</div>
          <div class="item-qty">x${item.qty}</div>
          <button class="btn btn-red-ghost btn-sm" onclick="deleteStock('${item.id}')">삭제</button>
        </div>`;
    }).join('');
    const total = stockItems.reduce((s,i) => s+(parseInt(i.qty)||0), 0);
    return `
      <div class="card">
        <div class="card-header">
          <div class="card-title">📋 재고 <span class="tag">${stockItems.length}종</span><span class="tag">${total}개</span></div>
          <button class="btn btn-white btn-sm" onclick="openModalStock()">+ 추가</button>
        </div>
        ${stockItems.length ? items : emptyState('📭','재고가 없습니다','재고를 추가해주세요')}
        ${stockItems.length ? `<hr class="divider"/><div class="actions-bar"><button class="btn btn-ghost btn-md" onclick="clearAllStock()">전체 초기화</button></div>` : ''}
      </div>`;
  }

  function emptyState(icon, title, desc) {
    return `<div class="empty-state"><div class="empty-icon">${icon}</div><div class="empty-title">${title}</div><div class="empty-desc">${desc}</div></div>`;
  }

  /* ── SETTINGS PAGE ── */
  let discordChannels = [];
  let discordRoles = [];
  let serverConfig = {
    vendingChannelId: '', vendingChannelName: '',
    stockAlertChannelId: '', stockAlertChannelName: '',
    stockAlertRoleId: '', stockAlertRoleName: '',
    buyLogChannelId: '', buyLogChannelName: '',
  };

  async function loadDiscordData() {
    try {
      const { doc, getDoc } = firestoreOps;
      const guildId = currentLicense.guildId;
      if (!guildId) { console.warn('[Panel] guildId 없음 - 라이선스 확인 필요'); return; }
      console.log('[Panel] Discord 데이터 로드 중... guildId:', guildId);
      const chSnap = await getDoc(doc(_dbRef, 'guilds', guildId, 'meta', 'channels'));
      const roSnap = await getDoc(doc(_dbRef, 'guilds', guildId, 'meta', 'roles'));
      const cfSnap = await getDoc(doc(_dbRef, 'guilds', guildId, 'meta', 'config'));
      if (chSnap.exists()) { discordChannels = chSnap.data().list || []; console.log('[Panel] 채널', discordChannels.length, '개 로드됨'); }
      else { console.warn('[Panel] 채널 데이터 없음 - 봇이 syncGuildData()를 실행해야 함'); }
      if (roSnap.exists()) { discordRoles = roSnap.data().list || []; console.log('[Panel] 역할', discordRoles.length, '개 로드됨'); }
      else { console.warn('[Panel] 역할 데이터 없음'); }
      if (cfSnap.exists()) Object.assign(serverConfig, cfSnap.data());
    } catch(e) { console.error('Discord 데이터 로드 오류:', e); }
  }

  function chOptions(selectedId) {
    if (!discordChannels.length) return `<option value="">⚠️ 봇이 채널 목록을 아직 업로드하지 않음</option>`;
    return discordChannels.map(ch =>
      `<option value="${ch.id}" ${ch.id === selectedId ? 'selected' : ''}># ${esc(ch.name)}</option>`
    ).join('');
  }

  function roleOptions(selectedId) {
    if (!discordRoles.length) return `<option value="">⚠️ 봇이 역할 목록을 아직 업로드하지 않음</option>`;
    return discordRoles.map(r =>
      `<option value="${r.id}" ${r.id === selectedId ? 'selected' : ''}>@ ${esc(r.name)}</option>`
    ).join('');
  }

  function buildSettingsPage() {
    const btnRows = vendingSettings.buttons.map((b,i) => `
      <div class="btn-edit-row">
        <input class="btn-edit-emoji" type="text" value="${esc(b.emoji)}" id="be${i}" placeholder="🔘" oninput="livePreview()"/>
        <input class="btn-edit-label" type="text" value="${esc(b.label)}" id="bl${i}" placeholder="버튼 이름" oninput="livePreview()"/>
        <button class="btn btn-red-ghost btn-sm" onclick="removeBtn(${i})">✕</button>
      </div>`).join('');

    const syncBadge = discordChannels.length
      ? `<span class="tag tag-green">✓ 동기화됨 · ${discordChannels.length}개 채널</span>`
      : `<span class="tag" style="color:var(--warning);border-color:rgba(251,191,36,0.3);">⚠️ 봇 미동기화</span>`;

    return `
      <div class="page-header">
        <div class="page-title">설정</div>
        <div class="page-sub">// 채널·역할 설정 및 자판기 관리</div>
      </div>
      <div class="settings-layout">
        <div>

          <div class="card">
            <div class="card-header">
              <div class="card-title">📡 서버 채널 설정 ${syncBadge}</div>
              <button class="btn btn-ghost btn-sm" onclick="refreshDiscordData()">🔄 새로고침</button>
            </div>
            <div class="form-field">
              <label>🤖 자판기 메시지 채널</label>
              <select id="cfg_vendingCh">
                <option value="">채널 선택</option>
                ${chOptions(serverConfig.vendingChannelId)}
              </select>
            </div>
            <div class="form-field">
              <label>📦 입고 알림 채널</label>
              <select id="cfg_stockCh">
                <option value="">채널 선택</option>
                ${chOptions(serverConfig.stockAlertChannelId)}
              </select>
            </div>
            <div class="form-field">
              <label>🔔 입고 알림 핑 역할</label>
              <select id="cfg_stockRole">
                <option value="">역할 선택 (없음)</option>
                ${roleOptions(serverConfig.stockAlertRoleId)}
              </select>
            </div>
            <div class="form-field">
              <label>🧾 구매 로그 채널</label>
              <select id="cfg_buyCh">
                <option value="">채널 선택</option>
                ${chOptions(serverConfig.buyLogChannelId)}
              </select>
            </div>
            <hr class="divider"/>
            <div class="actions-bar">
              <button class="btn btn-white btn-md" onclick="saveServerConfig()">💾 채널 설정 저장</button>
            </div>
          </div>

          <div class="card">
            <div class="card-header"><div class="card-title">🤖 자판기 메시지 내용</div></div>
            <div class="form-field">
              <label>임베드 제목</label>
              <input type="text" id="vs_title" value="${esc(vendingSettings.title)}" placeholder="Vending | 구매하기" oninput="livePreview()"/>
            </div>
            <div class="form-field">
              <label>임베드 설명</label>
              <textarea id="vs_desc" placeholder="설명..." oninput="livePreview()">${esc(vendingSettings.desc)}</textarea>
            </div>
            <div class="form-field" style="margin-bottom:6px;"><label>버튼 목록</label></div>
            <div id="btnRows">${btnRows}</div>
            <button class="btn-dashed" onclick="addBtn()">+ 버튼 추가</button>
            <hr class="divider"/>
            <div class="actions-bar">
              <button class="btn btn-white btn-md" onclick="saveVending()">💾 저장</button>
            </div>
          </div>

          <div class="card">
            <div class="card-header"><div class="card-title">📤 자판기 메시지 전송</div></div>
            <p style="font-size:12px;color:var(--text2);margin-bottom:14px;font-family:'JetBrains Mono',monospace;">위에서 설정한 자판기 채널로 메시지를 전송해요.</p>
            <div class="actions-bar">
              <button class="btn btn-white btn-md" onclick="sendVending()">📤 전송하기</button>
            </div>
          </div>

          <div class="card">
            <div class="card-header"><div class="card-title">📢 공지 전송</div></div>
            <div class="form-field">
              <label>공지 채널</label>
              <select id="cfg_noticeCh">
                <option value="">채널 선택</option>
                ${chOptions('')}
              </select>
            </div>
            <div class="form-field">
              <label>공지 내용</label>
              <textarea id="noticeText" placeholder="공지 내용을 입력하세요..."></textarea>

  let _dashChartSales = null;
  let _dashChartCount = null;

  async function initDashboard() {
    const guildId = currentLicense?.guildId;
    if (!guildId || !firestoreOps) return;
    const { collection, getDocs } = firestoreOps;

    const now = Date.now();
    const D = 86400000;
    const todayStart  = new Date(new Date().setHours(0,0,0,0)).getTime();
    const weekStart   = todayStart - 6 * D;
    const monthStart  = new Date(new Date().getFullYear(), new Date().getMonth(), 1).getTime();
    const yestStart   = todayStart - D;
    const lastWeekS   = weekStart - 7 * D;
    const lastMonthS  = new Date(new Date().getFullYear(), new Date().getMonth()-1, 1).getTime();
    const lastMonthE  = monthStart;

    function won(n) {
      if (n === 0) return '0원';
      if (n >= 100000000) return (n/100000000).toFixed(1) + '억원';
      if (n >= 10000) return Math.round(n/10000).toLocaleString() + '만원';
      return n.toLocaleString() + '원';
    }
    function pct(curr, prev) {
      if (!prev) return null;
      const p = ((curr - prev) / prev * 100).toFixed(1);
      return { p, up: parseFloat(p) >= 0 };
    }
    function setChange(elId, curr, prev) {
      const el = document.getElementById(elId);
      if (!el) return;
      const r = pct(curr, prev);
      if (!r) { el.textContent = '전일 대비 데이터 없음'; el.className = 'dash-stat-change neutral'; return; }
      el.className = 'dash-stat-change ' + (r.up ? 'up' : 'down');
      el.innerHTML = (r.up ? '↗' : '↘') + ' ' + (r.up ? '+' : '') + r.p + '% 전일 대비';
    }

    let chargeLogs = [];
    try {
      const snap = await getDocs(collection(_dbRef, 'guilds', guildId, 'chargeLogs'));
      snap.forEach(d => chargeLogs.push(d.data()));
    } catch(e) {}

    let purchaseLogs = [];
    try {
      const snap = await getDocs(collection(_dbRef, 'guilds', guildId, 'purchaseLogs'));
      snap.forEach(d => purchaseLogs.push(d.data()));
    } catch(e) {}

    const allLogs = [...chargeLogs, ...purchaseLogs];

    function sumRange(logs, from, to) {
      return logs.filter(l => { const t = l.timestamp||0; return t >= from && t < to; })
                 .reduce((s,l) => s + (l.amount||l.price||0), 0);
    }
    function countRange(logs, from, to) {
      return logs.filter(l => { const t = l.timestamp||0; return t >= from && t < to; }).length;
    }

    const totalCharge = chargeLogs.reduce((s,l) => s + (l.amount||0), 0);
    const el_tc = document.getElementById('d_totalCharge');
    if (el_tc) el_tc.textContent = totalCharge ? totalCharge.toLocaleString() + '원' : '데이터 없음';
    const el_tcs = document.getElementById('d_totalChargeSub');
    if (el_tcs) el_tcs.textContent = '충전 ' + chargeLogs.length + '건 · 구매 ' + purchaseLogs.length + '건 누적';

    const todaySales  = sumRange(allLogs, todayStart, todayStart + D);
    const yestSales   = sumRange(allLogs, yestStart, todayStart);
    const weekSales   = sumRange(allLogs, weekStart, now);
    const lastWeekS2  = sumRange(allLogs, lastWeekS, weekStart);
    const monthSales  = sumRange(allLogs, monthStart, now);
    const lastMonthSales = sumRange(allLogs, lastMonthS, lastMonthE);

    const el_t = document.getElementById('d_today'); if(el_t) el_t.textContent = won(todaySales);
    const el_w = document.getElementById('d_week');  if(el_w) el_w.textContent = won(weekSales);
    const el_m = document.getElementById('d_month'); if(el_m) el_m.textContent = won(monthSales);
    setChange('d_todayChange', todaySales, yestSales);
    setChange('d_weekChange', weekSales, lastWeekS2);
    setChange('d_monthChange', monthSales, lastMonthSales);

    const labels = [];
    const salesData = [];
    const countData = [];
    for (let i = 6; i >= 0; i--) {
      const from = todayStart - i * D;
      const to   = from + D;
      const d = new Date(from);
      labels.push((d.getMonth()+1) + '/' + d.getDate());
      salesData.push(sumRange(allLogs, from, to));
      countData.push(countRange(allLogs, from, to));
    }

    function makeChart(id, data, label, color) {
      const ctx = document.getElementById(id);
      if (!ctx) return null;
      return new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [{
            label,
            data,
            borderColor: color,
            backgroundColor: color.replace('1)', '0.08)'),
            borderWidth: 2,
            pointRadius: 3,
            pointBackgroundColor: color,
            tension: 0.4,
            fill: true
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: {
              grid: { color: 'rgba(255,255,255,0.04)' },
              ticks: { color: '#555', font: { family: 'JetBrains Mono', size: 11 } }
            },
            y: {
              grid: { color: 'rgba(255,255,255,0.04)' },
              ticks: {
                color: '#555',
                font: { family: 'JetBrains Mono', size: 11 },
                callback: v => id === 'chartSales'
                  ? (v >= 10000 ? Math.round(v/10000)+'만' : v)
                  : v + '건'
              }
            }
          }
        }
      });
    }

    if (_dashChartSales) { _dashChartSales.destroy(); _dashChartSales = null; }
    if (_dashChartCount) { _dashChartCount.destroy(); _dashChartCount = null; }
    _dashChartSales = makeChart('chartSales', salesData, '매출', 'rgba(74,222,128,1)');
    _dashChartCount = makeChart('chartCount', countData, '건수', 'rgba(96,165,250,1)');

    const prodCount = {};
    purchaseLogs.forEach(l => {
      const k = l.productName || '알 수 없음';
      prodCount[k] = (prodCount[k]||0) + 1;
    });
    const topProds = Object.entries(prodCount).sort((a,b)=>b[1]-a[1]).slice(0,5);
    const el_tp = document.getElementById('d_topProducts');
    if (el_tp) {
      if (!topProds.length) {
        el_tp.innerHTML = '<div class="dash-empty">구매 데이터가 없습니다</div>';
      } else {
        el_tp.innerHTML = topProds.map(([name, cnt], i) => `
          <div class="dash-rank">
            <span class="dash-rank-num">${i+1}</span>
            <span class="dash-rank-name">${esc(name)}</span>
            <span class="dash-rank-val">${cnt}건</span>
          </div>`).join('');
      }
    }

    const el_sl = document.getElementById('d_stockList');
    if (el_sl) {
      if (!stockItems.length) {
        el_sl.innerHTML = '<div class="dash-empty">재고 데이터가 없습니다</div>';
      } else {
        const stockByProd = {};
        stockItems.forEach(s => {
          const prod = products.find(p => p.id === s.prodId);
          const name = prod?.name || '알 수 없음';
          stockByProd[name] = (stockByProd[name]||0) + (parseInt(s.qty)||0);
        });
        const sorted = Object.entries(stockByProd).sort((a,b)=>b[1]-a[1]).slice(0,5);
        el_sl.innerHTML = sorted.map(([name, qty], i) => `
          <div class="dash-rank">
            <span class="dash-rank-num">${i+1}</span>
            <span class="dash-rank-name">${esc(name)}</span>
            <span class="dash-rank-val">${qty}개</span>
          </div>`).join('');
      }
    }
  }

  /* ── HELPERS ── */
  function esc(str) {
    return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  document.querySelectorAll('.modal-overlay').forEach(o => {
    o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); });
  });
</script>
</body>
</html>
